<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأستاذ محمد قاسم </title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:black;
  text-align:center;
}

.container{
  padding:40px 20px;
}

h1{
  font-size:45px;
  margin-bottom:10px;
}

p{
  color:#cbd5e1;
  font-size:18px;
  margin-bottom:40px;
}

.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

/* Card Design */
.card{
  background:#1e293b;
  width:280px;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 15px rgba(0,0,0,0.3);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
}

/* Video Section */
.video-box{
  margin-top:15px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.video-box iframe{
  width:100%;
  height:160px;
  border-radius:12px;
  border:none;
}

/* Button */
.btn{
  display:inline-block;
  margin-top:15px;
  padding:10px 18px;
  background:#3b82f6;
  color:white;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
}

/* Footer */
.footer{
  margin-top:50px;
  color:#94a3b8;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>📘 الأستاذ محمد قاسم </h1>

<p>الاسلامية اسهل ويانه </p>

<div class="cards">

  <!-- Math -->
  <div class="card">
    <h2>📗 الثالث متوسط </h2>
    <p>Lectures & Videos</p>

    <div class="video-box">
      <iframe src="https://www.youtube.com/embed/xTUywiwbv9k&t" allowfullscreen></iframe>
      <iframe src="https://www.youtube.com/embed/tewB49rtcw4" allowfullscreen></iframe>
    </div>

    <a class="btn" href="https://example.com" target="_blank">More Resources</a>
  </div>

  <!-- Physics -->
  <div class="card">
    <h2>📘 الرابع اعدادي </h2>
    <p>Videos & Notes</p>

    <div class="video-box">
      <iframe src="https://www.youtube.com/embed/acXwfmPYM7s" allowfullscreen></iframe>
      <iframe src="https://www.youtube.com/embed/DaJmwTrXRwA" allowfullscreen></iframe>
    </div>

    <a class="btn" href="https://example.com" target="_blank">Open</a>
  </div>

  <!-- CS -->
  <div class="card">
    <h2>الخامس اعدادي </h2>
    <p>Programming resources</p>

    <div class="video-box">
      <iframe src="https://www.youtube.com/embed/Vfo243mOpqI" allowfullscreen></iframe>
      <iframe src="https://www.youtube.com/embed/6SnUb_FiOTM" allowfullscreen></iframe>
    </div>

    <a class="btn" href="https://example.com" target="_blank">Open</a>
  </div>

</div>

<div class="footer">

</div>

</div>

</html>
