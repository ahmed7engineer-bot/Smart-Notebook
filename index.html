<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<title>المهندس احمد اللهيبي</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
}

/* LOGIN PAGE */

#loginPage{
  width:320px;
  margin:120px auto;
  background:#1e293b;
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}

#loginPage h2{
  margin-bottom:25px;
  color:#facc15;
}

#loginPage input{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border:none;
  border-radius:10px;
  outline:none;
  font-size:16px;
}

#message{
  margin-top:15px;
  color:#ff6b6b;
}

/* MAIN WEBSITE */

.container{
  padding:40px 20px;
  display:none;
}

h1{
  font-size:45px;
  color:#facc15;
  margin-bottom:10px;
}

p{
  color:#cbd5e1;
  font-size:18px;
}

/* SEARCH */

.search-box{
  position:relative;
  width:300px;
  margin:30px auto;
}

.search-box input{
  width:100%;
  padding:12px 40px 12px 15px;
  border:none;
  border-radius:10px;
  outline:none;
}

.search-box i{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  color:#555;
}

/* CARDS */

.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
}

.card{
  background:#1e293b;
  width:300px;
  padding:20px;
  border-radius:20px;
  transition:0.5s;
}

.card:hover{
  transform:translateY(-10px);
}

.card-img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:15px;
  margin-bottom:15px;
}

/* BUTTON */

.btn{
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  transition:0.4s;
}

.btn:hover{
  background:#2563eb;
  transform:scale(1.05);
}

/* INSTAGRAM */

.instagram{
  display:flex;
  align-items:center;
  justify-content:center;

  width:75px;
  height:75px;

  margin:35px auto 0;

  background:#E1306C;
  color:white;

  border-radius:50%;

  font-size:32px;

  text-decoration:none;

  transition:0.6s;
}

.instagram:hover{
  transform:scale(1.2) rotate(10deg);
  background:#c2185b;
}

/* FOOTER */

.footer{
  margin-top:40px;
  color:#94a3b8;
  font-size:14px;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<h2>تسجيل الدخول</h2>

<input type="text"
id="username"
placeholder="اسم المستخدم">

<input type="password"
id="password"
placeholder="كلمة المرور">

<button class="btn"
onclick="login()">
دخول
</button>

<p id="message"></p>

</div>

<!-- MAIN WEBSITE -->

<div class="container">

<h1>📘 المهندس احمد اللهيبي</h1>

<p>منصة تعليمية</p>

<!-- SEARCH -->

<div class="search-box">
<input type="text" placeholder="ابحث هنا...">
<i class="fa-solid fa-magnifying-glass"></i>
</div>

<!-- CARDS -->

<div class="cards">

<div class="card">
<img src="third.jpg" class="card-img">

<h2>📗 الثالث متوسط</h2>
<iframe width="100%" height="200"
src="https://www.youtube.com/embed/WhL9kFAS9RI"
title="YouTube video player"
frameborder="0"
allowfullscreen>
</iframe>
<button class="btn">
Open
</button>
</div>

<div class="card">
<img src="fourth.jpg" class="card-img">

<h2>📘 الرابع اعدادي</h2>
<div class="card">

<h2>شرح الرياضيات</h2>

<iframe width="100%" height="200"
src="https://www.youtube.com/embed/WhL9kFAS9RI"
frameborder="0"
allowfullscreen>
</iframe>

</div>
<button class="btn">
Open
</button>
</div>

<div class="card">
<img src="fifth.jpg" class="card-img">

<h2>📙 الخامس اعدادي</h2>
<div class="card">

<h2>شرح الرياضيات</h2>

<iframe width="100%" height="200"
src="https://www.youtube.com/embed/WhL9kFAS9RI"
frameborder="0"
allowfullscreen>
</iframe>

</div>
<button class="btn">
Open
</button>
</div>

</div>

<!-- INSTAGRAM -->

<a href="https://instagram.com/ah4.l"
target="_blank"
class="instagram">

<i class="fa-brands fa-instagram"></i>

</a>

<!-- FOOTER -->

<div class="footer">
Developed by Eng Ahmed A. Zaidan ⚡
</div>

</div>

<!-- JAVASCRIPT -->

<script>

function login(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

if(username === "ahmed" &&
password === "1234"){

document.getElementById("loginPage")
.style.display = "none";

document.querySelector(".container")
.style.display = "block";

}else{

document.getElementById("message")
.innerHTML =
"اسم المستخدم او كلمة المرور غير صحيحة";

}

}

</script>

</body>
</html>
