<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Notebook</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0f172a;
      color:white;
      text-align:center;
    }

    .container{
      padding:40px 20px;
    }

    h1{
      font-size:45px;
      margin-bottom:10px;
    }

    p{
      color:#cbd5e1;
      font-size:18px;
      margin-bottom:40px;
    }

    .cards{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
    }

    .card{
      background:#1e293b;
      width:250px;
      padding:25px;
      border-radius:20px;
      transition:0.3s;
      box-shadow:0 0 15px rgba(0,0,0,0.3);
    }

    .card:hover{
      transform:translateY(-8px);
    }

    .card h2{
      margin-bottom:15px;
    }

    .btn{
      display:inline-block;
      margin-top:15px;
      padding:12px 20px;
      background:#3b82f6;
      color:white;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
    }

    .footer{
      margin-top:50px;
      color:#94a3b8;
      font-size:14px;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>📘 Smart Notebook</h1>

    <p>
      Touch your notebook and access your study materials instantly
    </p>

   <div class="card">
  <h2>📗 Math</h2>
  <p>Access math lectures and videos</p>

  <!-- Video 1 -->
  <iframe width="100%" height="150"
    src="https://www.youtube.com/embed/t3_dgJrl_bw"
    title="Math Video 1"
    frameborder="0"
    allowfullscreen>
  </iframe>

  <!-- Video 2 -->
  <iframe width="100%" height="150"
    src="https://www.youtube.com/embed/qyU8ApZ30j4"
    title="Math Video 2"
    frameborder="0"
    allowfullscreen>
  </iframe>

  <a class="btn" href="https://example.com" target="_blank">
    More Resources
  </a>
</div>

      <div class="card">
        <h2>📘 Physics</h2>
        <p>Open physics files and videos</p>
        <a class="btn" href="https://example.com" target="_blank">
          Open
        </a>
      </div>

      <div class="card">
        <h2>💻 Computer Science</h2>
        <p>Programming and CS resources</p>
        <a class="btn" href="https://example.com" target="_blank">
          Open
        </a>
      </div>

    </div>

    <div class="footer">
      Powered by NFC Technology ⚡
    </div>

  </div>

</body>
</html>
