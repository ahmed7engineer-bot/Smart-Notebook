<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<title>المهندس احمد اللهيبي</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
}

.container{
  padding:40px 20px;
}

h1{
  font-size:45px;
  color:#facc15;
  margin-bottom:10px;
}

p{
  color:#cbd5e1;
  font-size:18px;
}

/* Search */

.search-box{
  position:relative;
  width:300px;
  margin:30px auto;
}

.search-box input{
  width:100%;
  padding:12px 40px 12px 15px;
  border:none;
  border-radius:10px;
  outline:none;
  font-size:16px;
}

.search-box i{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  color:#555;
}

/* Cards */

.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
}

.card{
  background:#1e293b;
  width:300px;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 15px rgba(0,0,0,0.3);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 20px rgba(59,130,246,0.5);
}

/* Card Images */

.card-img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:15px;
  margin-bottom:15px;
}

.card h2{
  color:#38bdf8;
  margin-bottom:10px;
}

/* Buttons */

.btn{
  display:inline-block;
  margin-top:15px;
  padding:10px 18px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#2563eb;
}

/* Videos */

.videos-section{
  display:none;
  margin-top:60px;
}

.videos-section h2{
  margin-bottom:25px;
  color:#facc15;
}

.video-box{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.video-box iframe{
  width:350px;
  height:200px;
  border:none;
  border-radius:15px;
}

/* Footer */

.footer{
  margin-top:60px;
  color:#94a3b8;
  font-size:14px;
  text-align:center;
}

/* Mobile */

@media(max-width:768px){

  h1{
    font-size:32px;
  }

  .card{
    width:100%;
    max-width:340px;
  }

  .video-box iframe{
    width:100%;
  }

}
font-size:40px;
  color:#E1306C;
  transition:0.3s;
}

.instagram:hover{
  transform:scale(1.3) rotate(10deg);
}
</style>
</head>

<body>

<div class="container">

<h1>📘 المهندس احمد اللهيبي</h1>

<p>منصة تعليمية للمراحل الدراسية</p>

<!-- Search -->

<div class="search-box">

<input type="text"
id="searchInput"
placeholder="ابحث عن المرحلة...">

<i class="fa-solid fa-magnifying-glass"></i>

</div>

<!-- Cards -->

<div class="cards">

<!-- الثالث متوسط -->

<div class="card">

<img src="download (7)s.jpg" class="card-img">

<h2 class="card-title">📗 الثالث متوسط</h2>

<p>محاضرات وفيديوهات</p>

<button class="btn"
onclick="showVideos('thirdVideos')">
Open
</button>

</div>

<!-- الرابع اعدادي -->

<div class="card">

<img src="download ().jpg" class="card-img">

<h2 class="card-title">📘 الرابع اعدادي</h2>

<p>فيديوهات وملخصات</p>

<button class="btn"
onclick="showVideos('fourthVideos')">
Open
</button>

</div>

<!-- الخامس اعدادي -->

<div class="card">

<img src="sp.jpg" class="card-img">

<h2 class="card-title">📙 الخامس اعدادي</h2>

<p>مصادر تعليمية</p>

<button class="btn"
onclick="showVideos('fifthVideos')">
Open
</button>

</div>

</div>

<!-- فيديوهات الثالث -->

<div id="thirdVideos" class="videos-section">

<h2>📗 فيديوهات الثالث متوسط</h2>

<div class="video-box">

<iframe
src="https://www.youtube.com/embed/xTUywiwbv9k"
allowfullscreen>
</iframe>

<iframe
src="https://www.youtube.com/embed/tewB49rtcw4"
allowfullscreen>
</iframe>

</div>

</div>

<!-- فيديوهات الرابع -->

<div id="fourthVideos" class="videos-section">

<h2>📘 فيديوهات الرابع اعدادي</h2>

<div class="video-box">

<iframe
src="https://www.youtube.com/embed/acXwfmPYM7s"
allowfullscreen>
</iframe>

<iframe
src="https://www.youtube.com/embed/DaJmwTrXRwA"
allowfullscreen>
</iframe>

</div>

</div>

<!-- فيديوهات الخامس -->

<div id="fifthVideos" class="videos-section">

<h2>📙 فيديوهات الخامس اعدادي</h2>

<div class="video-box">

<iframe
src="https://www.youtube.com/embed/Vfo243mOpqI"
allowfullscreen>
</iframe>

<iframe
src="https://www.youtube.com/embed/6SnUb_FiOTM"
allowfullscreen>
</iframe>

</div>

</div>

<!-- Footer -->

<!-- Footer -->

<div class="footer">

<p>Developed by Eng Ahmed A. Zaidan ⚡</p>

<a href="https://instagram.com/ah4.l"
target="_blank"
class="instagram">

<i class="fa-brands fa-instagram"></i>

</a>

</div>
<!-- JavaScript -->

<script>

/* Search */

const searchInput =
document.getElementById("searchInput");

const cards =
document.querySelectorAll(".card");

searchInput.addEventListener("keyup", function(){

const searchValue =
searchInput.value.toLowerCase();

cards.forEach(card => {

const title =
card.querySelector(".card-title")
.textContent.toLowerCase();

if(title.includes(searchValue)){

card.style.display = "block";

}else{

card.style.display = "none";

}

});

});

/* Show Videos */

function showVideos(id){

document
.querySelectorAll('.videos-section')
.forEach(section => {

section.style.display = "none";

});

document
.getElementById(id)
.style.display = "block";

window.scrollTo({

top:
document.getElementById(id)
.offsetTop,

behavior:"smooth"

});

}

</script>

</body>
</html>
